<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚とびこえる魔女</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#18A8D9;
}
canvas{
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<audio id="bgm" loop>
  <source src="bgm.m4a" type="audio/mp4">
</audio>

<audio id="clearSe">
  <source src="clear.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const bgm = document.getElementById("bgm");
const clearSe = document.getElementById("clearSe");

const BASE_WIDTH = 800;
const BASE_HEIGHT = 200;

// =====================================
// リサイズ
// =====================================
function resize(){
  const w = window.innerWidth;
  const h = window.innerHeight;
  const scale = Math.min(w / BASE_WIDTH, h / BASE_HEIGHT);

  canvas.width = BASE_WIDTH * scale;
  canvas.height = BASE_HEIGHT * scale;
}
window.addEventListener("resize", resize);
resize();

// =====================================
// 背景
// =====================================
const bgStatic = new Image();
bgStatic.src = "background.png";

const bgMove1 = new Image();
bgMove1.src = "background_move1.png";

const bgMove2 = new Image();
bgMove2.src = "background_move2.png";

let bgOffset = BASE_WIDTH;
let bgSpeed = 5;
let bgStopped = false;

// =====================================
// プレイヤー画像
// =====================================
const playerImgs = [];

for(let i=1;i<=4;i++){
  const img = new Image();
  img.src = `player ${i}.png`;
  playerImgs.push(img);
}

const playerUpImg = new Image();
playerUpImg.src = "player up.png";

const playerDownImg = new Image();
playerDownImg.src = "player down.png";

// =====================================
// 敵画像
// =====================================
const fishRed = new Image();
fishRed.src = "fish red.png";

const fishBlue = new Image();
fishBlue.src = "fish blue.png";

// =====================================
// クリアアニメ
// =====================================
const flyFrames = [];

for(let i=1;i<=20;i++){
  const img = new Image();
  img.src = `player_fly${i}.png`;
  flyFrames.push(img);
}

const flyOffsets = [
  { x: 0, y: 0 },
  { x: -2, y: 0 },
  { x: -4, y: -2 },
  { x: -6, y: -4 },
  { x: 359, y: -24 },
  { x: 443, y: -56 },
  { x: 474, y: -105 },
  { x: 475, y: -119 },
  { x: 474, y: -122 },
  { x: 473, y: -125 },
  { x: 472, y: -128 },
  { x: 471, y: -52 },
  { x: 471, y: -8 },
  { x: 470, y: -7 },
  { x: 470, y: -7 },
  { x: 470, y: -7 },
  { x: 470, y: -7 },
  { x: 470, y: -7 },
  { x: 470, y: -7 },
  { x: 470, y: -7 }
];

// =====================================
// 状態
// =====================================
let player;
let obstacles = [];
let score = 0;

let gameOver = false;
let cleared = false;

let gravity = 0.8;
let startTime;

let frameIndex = 0;

let floatTimer = 0;

let animating = false;
let animFrame = 0;
let animTimer = 0;

let bgmStarted = false;
let sePlayed = false;

let inputLocked = false;

let spacePressed = false;

// =====================================
// フレーム制御（5FPS）
// =====================================
let lastFrameTime = 0;

// =====================================
// 初期化
// =====================================
function init(){

  player = {
    x:50,
    y:135,
    width:75,
    height:50,
    dy:0,
    jump:0
  };

  obstacles = [];
  score = 0;

  gameOver = false;
  cleared = false;

  startTime = Date.now();

  bgOffset = BASE_WIDTH;
  bgSpeed = 2;
  bgStopped = false;

  animating = false;
  animFrame = 0;
  animTimer = 0;
}

// =====================================
// BGM
// =====================================
function startBGM() {
  
  if (bgmStarted) return;
  
  bgm.volume = 0.5;
  
  bgm.play()
    .then(() => {
      
      bgmStarted = true;
      
      clearSe.load();
      
    })
    .catch(() => {});
}
// =====================================
// 操作
// =====================================
// =====================================
// 操作（修正版）
// =====================================
function action() {
  
  if (!player) return;
  
  if (inputLocked) return;
  
  startBGM();
  
  if (gameOver) {
    
    init();
    
    return;
  }
  
  
  if (player.jump < 3) {
    
    player.dy = -12;
    
    player.jump++;
    
  }
  
}


// -------------------------------
// キーボード Space
// -------------------------------
// =====================================
// Spaceキー（安定版）
// =====================================

window.addEventListener("keydown", function(e) {
  
  if (e.keyCode === 32) {
    
    e.preventDefault();
    
    if (spacePressed) return;
    
    spacePressed = true;
    
    action();
    
  }
  
});

window.addEventListener("keyup", function(e) {
  
  if (e.keyCode === 32) {
    
    spacePressed = false;
    
  }
  
});

// -------------------------------
// マウスクリック
// -------------------------------
// -------------------------------
// 画面全体クリック
// -------------------------------
window.addEventListener("mousedown", function(e) {
  
  e.preventDefault();
  
  action();
  
});


// -------------------------------
// 画面全体タッチ
// -------------------------------
window.addEventListener("touchstart", function(e) {
  
  e.preventDefault();
  
  window.focus();
  
  action();
  
}, { passive: false });

// =====================================
// 敵生成
// =====================================
function spawnObstacle() {
  
  const img = Math.random() < 0.5 ?
    fishRed :
    fishBlue;
  
  obstacles.push({
  x: BASE_WIDTH,
  prevX: BASE_WIDTH,
  y: 140,
  width: 30,
  height: 30,
  img: img,
  passed: false
});
}

// =====================================
// プレイヤー画像取得
// =====================================
function getPlayerImg(){
  
  if(player.jump > 0){
    return player.dy < 0
      ? playerUpImg
      : playerDownImg;
  }

  return playerImgs[frameIndex];
  }

// =====================================
// ピクセル判定
// =====================================


// =====================================
// 背景更新
// =====================================
function updateBackground() {
  
  const elapsed =
    (Date.now() - startTime) / 1000;
  
  if (gameOver || bgStopped) return;
  
  const distance = Math.abs(bgOffset);
  const slowStartTime = 8;
  if(elapsed < slowStartTime){
    
  }else{
  if (distance > 500) {
    bgSpeed *= 0.980;
  } else {
    bgSpeed *= 0.975;
  }
  }
  
  bgSpeed = Math.max(bgSpeed, 0.5);
  
  bgOffset -= bgSpeed;
  
  // ==========================
  // クリア判定
  // ==========================
  if (bgOffset <= -BASE_WIDTH && !sePlayed) {
    
    sePlayed = true;
    
    bgOffset = -BASE_WIDTH;
    
    bgSpeed = 0;
    
    bgStopped = true;
    
    cleared = true;
    gameOver = true;
    
    inputLocked = true;
    
    // 🔊 クリアSE
    clearSe.currentTime = 0;
    
    clearSe.play().catch(err => {
      console.log("SE再生失敗:", err);
    });
    
    // 🎵 BGM停止
    bgm.pause();
    
    bgm.currentTime = 0;
    
    // 🎬 アニメ開始
    clearSe.onended = () => {
      
      animating = true;
      
      animFrame = 0;
      
      animTimer = 0;
    };
  }
}  

// =====================================
// 更新
// =====================================
function update(){

  if(gameOver && !cleared){
    return;
  }

  // --------------------------
  // プレイヤーフレーム5FPS
  // --------------------------
  const now = Date.now();

  if(now - lastFrameTime > 1000 / 5){

    frameIndex++;

    if(frameIndex >= playerImgs.length){
      frameIndex = 0;
    }

    lastFrameTime = now;
  }

  // --------------------------
  // 浮遊
  // --------------------------
  floatTimer += 0.1;

  // --------------------------
  // プレイヤー
  // --------------------------
  player.y += player.dy;

  player.dy += gravity;

  if(player.y > 135){

    player.y = 135;

    player.dy = 0;

    player.jump = 0;
  }

  // --------------------------
  // 敵
  // --------------------------
const playerLine = player.x + 20;

obstacles.forEach(o => {
  
  o.x -= 5;
  
  if (!o.passed && o.x + o.width < playerLine) {
    o.passed = true;
    
    if (player.y < 135) {
      score++;
    }
  }
});
  obstacles =
    obstacles.filter(o=>o.x + o.width > 0);

  // --------------------------
  // 敵生成
  // --------------------------
  if(!cleared){

    if(Math.random() < 0.02){

      if(obstacles.length < 8){

        spawnObstacle();
      }
    }
  }

  // --------------------------
  // 当たり判定
  // --------------------------
    // --------------------------
  // 当たり判定
  // --------------------------
  if (!cleared) {
    
    obstacles.forEach(o => {
      
      // ジャンプ中だけ判定
      if (player.jump > 0) {
        
        // プレイヤー判定
        const playerHitbox = {
          
          x: player.x + 20,
          y: player.y + 12,
          
          width: player.width - 40,
          height: player.height - 24
        };
        
        // 敵判定
        const enemyHitbox = {
          
          x: o.x + 8,
          y: o.y + 8,
          
          width: o.width - 16,
          height: o.height - 16
        };
        
        // 四角判定
        if (
          
          playerHitbox.x <
          enemyHitbox.x + enemyHitbox.width
          
          &&
          
          playerHitbox.x + playerHitbox.width >
          enemyHitbox.x
          
          &&
          
          playerHitbox.y <
          enemyHitbox.y + enemyHitbox.height
          
          &&
          
          playerHitbox.y + playerHitbox.height >
          enemyHitbox.y
          
        ) {
          
          gameOver = true;
        }
      }
    });
  }
  // --------------------------
  // 背景
  // --------------------------
  updateBackground();
}

// =====================================
// 描画
// =====================================
function draw(){

  const scale =
    canvas.width / BASE_WIDTH;

  ctx.setTransform(
    scale,
    0,
    0,
    scale,
    0,
    0
  );

  ctx.clearRect(
    0,
    0,
    BASE_WIDTH,
    BASE_HEIGHT
  );

  // --------------------------
  // 背景
  // --------------------------
  if(bgStatic.complete){

    ctx.drawImage(
      bgStatic,
      0,
      0,
      BASE_WIDTH,
      BASE_HEIGHT
    );
  }

  if(bgMove1.complete && bgMove2.complete){

    ctx.drawImage(
      bgMove1,
      bgOffset,
      0,
      BASE_WIDTH,
      BASE_HEIGHT
    );

    ctx.drawImage(
      bgMove2,
      bgOffset + BASE_WIDTH,
      0,
      BASE_WIDTH,
      BASE_HEIGHT
    );
  }

  // --------------------------
  // プレイヤー
  // --------------------------
  const floatOffset =
    Math.sin(floatTimer) * 3;

  if(!animating){

    const img = getPlayerImg();

    const ratio =
      img.height / img.width;

    const drawW = player.width;

    const drawH =
      drawW * ratio;

    ctx.drawImage(
      img,
      player.x,
      player.y + floatOffset - (drawH - player.height),
      drawW,
      drawH
    );

  }else{

    animTimer++;

    if(animTimer % 12 === 0){

      if(animFrame < flyFrames.length - 1){
        animFrame++;
      }
    }

    const img = flyFrames[animFrame];

    const off = flyOffsets[animFrame];

    const ratio =
      img.height / img.width;

    const drawW =
      player.width * 1.2;

    const drawH =
      drawW * ratio;

    ctx.drawImage(
      img,
      player.x + off.x,
      player.y + off.y - (drawH - player.height),
      drawW,
      drawH
    );
  }

  // --------------------------
  // 敵描画
  // --------------------------
  obstacles.forEach(o=>{

    ctx.drawImage(
      o.img,
      o.x,
      o.y,
      o.width,
      o.height
    );
  });

  // --------------------------
  // UI
  // --------------------------
  ctx.fillStyle = "black";
  ctx.font = "20px sans-serif";

  ctx.fillText(
    "Score: " + score,
    650,
    20
  );

  if(gameOver){
  }
}

// =====================================
// ループ
// =====================================
function loop(){

  update();

  draw();

  requestAnimationFrame(loop);
}

init();
loop();

</script>
</body>
</html>
